name: Deploy RAG Worker

on:
  push:
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-rag-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create Vectorize Index (ignore error if exists)
        run: |
          wrangler vectorize create afs-legal-library \
            --dimensions=768 \
            --metric=cosine || echo "Index may already exist, continuing"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9bea09921174a686e6e21a0f4da931e

      - name: Deploy Worker
        run: wrangler deploy
        working-directory: workers/rag-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9bea09921174a686e6e21a0f4da931e
