name       = "afs-legal-rag"
main       = "src/cloudflare-worker.ts"
compatibility_date = "2024-09-23"

# ── Workers AI (for embeddings) ───────────────────────────────────────────────
[ai]
binding = "AI"

# ── Vectorize index ───────────────────────────────────────────────────────────
# Create with: wrangler vectorize create afs-legal-library --dimensions=768 --metric=cosine
[[vectorize]]
binding    = "VECTORIZE"
index_name = "afs-legal-library"

# ── Optional: CORS allowed origins ────────────────────────────────────────────
# [vars]
# ALLOWED_ORIGIN = "https://your-app.pages.dev"

# ── Secrets (set via CLI, never in this file) ─────────────────────────────────
# AUTH_TOKEN — wrangler secret put AUTH_TOKEN
