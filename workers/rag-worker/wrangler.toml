name = "afs-legal-rag"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "afs-legal-library"

# Phase 6 — Case History RAG
# Create this index before deploying:
#   npx wrangler vectorize create afs-case-history --dimensions=768 --metric=cosine
[[vectorize]]
binding = "CASE_HISTORY"
index_name = "afs-case-history"

[[d1_databases]]
binding = "DB"
database_name = "afs-legal-meta"
database_id = "88274373-8745-4d8c-a241-1bb63aca9c0f"

[[r2_buckets]]
binding = "R2"
bucket_name = "afs-legal-library"
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

